displayName: Ink6x
headline: AIワークフロー自動化 / フルスタックWebアプリ開発（Next.js・TypeScript）
intro: 実業務に組み込むAIワークフロー自動化と、Next.js/TypeScriptによるWebアプリ開発を専門にしています。AIに生成・要約を任せつつ、承認フロー・監査ログ・実行制御で守る設計を得意とし、クライアント業務の工数を定量的に削減してきました。
careerSummary: 2022年末から約3年半にわたり、機械学習PoCを起点に、LLM/RAGアーキテクチャ設計、フルスタックWebサービス開発、社内DX、エンタープライズ向け業務自動化基盤の構築まで、幅広い領域で複数の現場を経験してきました。社員数名規模の中小事業者から数十万ユーザーを抱えるサービス、大企業向けのエンタープライズ基盤まで、規模もフェーズも異なる8案件以上に携わっており、並行して多数のWeb受託開発も継続的に手がけてきました。「AIに任せる領域と、人間の承認・監査・実行制御で守る領域を分ける設計」を一貫した軸としながら、コーチング事業者向けのAI実行基盤、採用代行事業者向けのスカウト自動化プラットフォーム、業務自動化ワークフローなど複数案件を同時並行で担当した経験もあります。要件定義・アーキテクチャ設計・実装・本番デプロイ・運用保守までを一人で完結させた案件を複数持ち、現在も技術戦略の立案から実装まで一貫して担える実務者として活動しています。
strengths:
  - LLMに任せる領域と、人間の承認・監査・実行制御で守る領域を分けた設計
  - AIを自律的な実行主体にせず、AIの出力を人間とシステムが検証・承認した上で動かす
  - 要件整理から設計・実装・本番運用まで一人で完結
  - ハルシネーション排除・コスト最適化・本番稼働まで含めて設計する
  - LLMの出力ブレに依存しない決定論的なレイヤーを設計に組み込む
  - 動くプロトタイプを2〜3週間で提供し、実運用に耐える品質まで仕上げる
  - 納品して終わりではなく、操作研修や保守まで含めて伴走する
  - ホームページ制作からWebアプリ開発まで、Web受託開発を継続的に手がけてきた
works:
  - name: コーチング事業者向けAI業務自動化
    summary: Discord Botによる日次振り返り収集、週次・月次レポートの自動生成、承認付きLINE配信、RAG検索、管理ダッシュボードを統合したAI実行基盤の構築
    outcomes:
      - 週150分かかっていたレポート作成業務を実質ゼロに
      - 1件5分かかっていた月次レポート送信が30秒に短縮
      - 導入1ヶ月で生徒数が30名増加、解約率が30%低下し、新規4名のコーチ採用が可能な体制に
    experienceNote: 50名の生徒を抱えながら実質1人で運営するコーチングスクールでは、面談後のレポート作成・保護者への送信・提出確認だけで週150分以上のルーティンが発生し、支援の質を高める余白がない状態でした。過去に複数コーチ体制を試みたものの情報共有が機能せず崩壊した経緯があり、工数削減より「記録・整理・送信・参照が分散した運営構造そのもの」を解決する必要がありました。要件整理から本番デプロイまで単独で担当し、日次→週次→月次へ段階的に集約する設計、AIが生成したレポートをコーチが確認して配信する多層フローを実装しました。約1.5ヶ月で本番稼働に移行し、現在も継続稼働しています。
    stack:
      - Python
      - Discord.py
      - Next.js
      - TypeScript
      - React
      - Supabase (PostgreSQL)
      - LLM API (OpenAI/Anthropic)
      - LINE Messaging API
      - RAG
      - Docker
      - Render
    url: https://github.com/Ink6x/coaching-ai-workflow
  - name: エンタープライズ向けAI業務自動化基盤
    summary: Slackから自然言語で対外オペレーション業務を制御できる実行基盤を設計・開発。AIが実行計画を生成し、Policy Gateによる8項目の機械的検証と人間承認を経るまで外部副作用ゼロを保証する安全設計。
    outcomes:
      - 担当者1人あたり月15〜20時間の工数を削減(チーム全体では約60時間/月規模のルーティンが対象)
      - コマンド更新にかかる時間を約1/4に圧縮
      - 複数ツールを横断していた状況確認が10分から1分台へ短縮
    experienceNote: 複数のプラットフォームをCLIで個別操作し、状況管理も複数ツールに分散していたため、チーム全体で月60時間規模の工数がルーティン作業に費やされていました。「AIに実行させない」という設計判断を核に据え、登録済みコマンドのみ受け付ける型付きDSLとPolicy Gateによる多段検証で安全性を担保しつつ、Slackから自然言語で操作できる基盤へ再設計しました。メンバー2名のスケジュール・コードレビュー管理からクライアントとの週次定例・工数見積まで一貫して担当し、設計・開発・運用ドキュメントをGitHubで公開しています。
    stack:
      - Python
      - Slack API
      - Action DSL（自作）
      - Policy Gate
      - Command Registry
      - Playwright
      - Docker
      - AWS
      - PostgreSQL (State Store)
      - Notion API
      - Audit Logging
    url: https://github.com/Ink6x/ai-workflow-automation
  - name: 自動車販売・整備事業者向け社内DX
    summary: 顧客進捗・案件状況・台車運用を一元管理するWebアプリを設計・実装。紙書類のOCR取り込み、LLMによる書類フォーマット自動生成、スケジュールレコメンド機能を統合。
    outcomes:
      - 導入後、月あたり7件の受注増加を実現
      - 顧客対応のレスポンス時間短縮と案件管理ミスの削減を確認（数値は非公開）
    experienceNote: 社員4名規模の自動車販売・整備事業者で、顧客の進捗・整備スケジュール・台車の運用状況がすべて経営者の頭の中に属人化しており、情報共有や案件管理に大きな負担が生じていました。経営者へのヒアリングから要件定義を自ら担い、管理画面・バックエンド・データモデリングの設計と実装をすべてひとりで完遂しました。本番デプロイ後には操作研修も行い、契約終了後も保守・機能追加の依頼をいただける関係を継続しています。
    stack:
      - Python
      - TypeScript
      - Next.js
      - Tailwind CSS
      - FastAPI
      - PostgreSQL (Supabase)
      - Supabase Auth
      - Anthropic Claude API (Vision/書類生成)
      - Vercel
  - name: 求人スカウト業務自動化プラットフォーム
    summary: 複数求人媒体へのスカウト送信・応募者管理を自動化するWebアプリとクラウド基盤を開発。データモデル設計からAPI実装・管理画面・インフラのコード化・CI/CDまで一気通貫で担当しました。
    outcomes:
      - 新規3媒体の連携をデータモデル・API・管理画面まで一気通貫で実装
      - 本番から完全独立したstaging環境をゼロから構築し、検証してから本番へ出すデプロイフローを確立
      - GitHub Actions + Artifact Registryによるデプロイを完全自動化し、インフラ構成もすべてTerraformでコード管理
    experienceNote: 求人媒体ごとに管理画面や仕様がバラバラで、対応媒体を増やすたびに人手作業と実装コストが積み上がる構造に課題がありました。本番と検証環境が分離されておらず、リリースのたびにリスクを伴う状態でもありました。そこでDjangoによる媒体連携の一気通貫実装と、クラウド基盤の整備を並行して進め、安全にリリースできる開発フローを整えました。約6か月の参画を通じて、拡張性と運用安定性を両立した基盤へと刷新しています。
    stack:
      - Python
      - Django
      - Django REST Framework
      - FastAPI（連携）
      - PostgreSQL (Cloud SQL)
      - Terraform
      - Cloud Run
      - GCP
      - Docker
      - GitHub Actions
      - Playwright（連携）
    url: https://ink6x.vercel.app/work/scout-automation-platform
  - name: 社内文書RAGパイプライン構築
    summary: エンタープライズ向け社内文書RAGシステムの開発に参画し、ドキュメント取り込み・チャンク化・埋め込み・ベクトル検索のパイプラインを一貫構築しました。
    outcomes:
      - ドキュメント取り込みからベクトル検索まで、社内文書RAGパイプラインを一貫構築し、エンタープライズ顧客への導入を実現
    experienceNote: 「社内に散らばった文書をAIに答えさせたい」というエンタープライズ企業の課題に対し、AI開発受託企業の業務委託として参画しました。文書の形式や保管場所がばらばらな状況で、OpenAI API・LangChain・LangGraphを活用したRAGアーキテクチャを設計・実装しました。検索精度のチューニングや、LLMと古典的機械学習の使い分けといった技術選定の議論にも加わり、取り込みから検索まで一貫して動くパイプラインを完成させました。
    stack:
      - Python
      - LangChain
      - LangGraph
      - OpenAI SDK
      - RAG
      - Vector DB
      - PostgreSQL
  - name: マッチングサービス0→1立ち上げ(AI推論担当)
    summary: 新規マッチングサービスの立ち上げにおいて、LLM embeddingベースの類似度マッチングロジックを設計から実装まで主担当。プロフィール画像解析・テキスト解析・推論API構築を一貫して担いました。
    outcomes:
      - マッチングの核となる推論ロジック設計・API実装を主担当として、仮説検証サイクルを回しながら完遂
    experienceNote: 仕様がまだ定まっていない新規サービスの立ち上げ期に、4名チームの一員としてフルコミットで参画しました。マッチングの精度と開発スピードを両立させるため、LLMの埋め込み表現を活用した類似度算出ロジックをゼロから設計し、画像・テキスト双方の情報を組み合わせる推論APIとして実装しました。クローズドβでユーザーの反応を見ながら仮説検証を繰り返す体制の中で、マッチングロジック設計から推論API実装までの工程を完遂しました。
    stack:
      - Python
      - FastAPI
      - TypeScript
      - NestJS
      - Express
      - React
      - PostgreSQL
      - LLM API
      - Embedding
      - AWS
  - name: 顔写真で歴史人物マッチングWebアプリ
    summary: 顔写真を送るだけで200名の歴史人物データベースから「最も魂が近い1名」を判定し、理由・歴史エピソード・名言を生成するWebアプリ。特徴抽出・決定論的判定・ナラティブ生成の3段パイプライン構成、動的OGPシェア機能を実装。
    outcomes:
      - 200名・8カテゴリの歴史人物データベースから判定。顔特徴を8軸で構造化抽出し、LLM不介在の決定論的スコアリングで架空人物の出力をゼロに抑制
      - アップロードされた画像のサーバー保存件数0件。メモリ上のみで処理するプライバシー設計を実装
    experienceNote: LLMアプリでよく起きる「同じ人物ばかり出る」「存在しない架空人物が返ってくる」「判断根拠がブレる」という課題を、設計の力で構造ごと解決することを目指したプロジェクトです。判定ロジックをLLMに頼らず純粋な計算処理として実装することで、同じ顔写真には必ず同じ結果が返る仕組みを実現しました。また、画像はサーバーに一切保存しないメモリ処理のみとし、プライバシーに配慮した設計としています。GitHub公開・Vercel上でエンドツーエンドの動作を確認済みです。
    stack:
      - Next.js
      - React 19
      - TypeScript
      - Claude API
      - Tool Use
      - Prompt Caching
      - Tailwind CSS
      - Zod
      - Upstash Redis
      - Vercel
