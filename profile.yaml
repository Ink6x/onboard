displayName: じゅり
headline: AI開発 / AIを用いた業務効率化・DX / Webアプリ開発（Next.js・TypeScript）
intro: 実業務に組み込むAIワークフロー自動化と、Next.js/TypeScriptによるWebアプリ開発を専門にしています。AIに生成・要約を任せつつ、承認フロー・監査ログ・実行制御で守る設計を得意とし、クライアント業務の工数を定量的に削減してきました。
careerSummary: AI開発・Web受託開発の領域で5年以上の実務経験を持ち、機械学習PoCを皮切りに、LLM/RAGシステム設計、フルスタックWebアプリ開発、社内DX、エンタープライズ向け業務自動化基盤の構築まで、多岐にわたる領域で10件近くの現場を経験してきました。社員数名の小規模事業者から従業員数十名規模のコーチング事業者・AI開発受託企業・エンタープライズ向け業務システムの開発現場まで、規模や業種を問わず幅広いクライアントと向き合ってきたことが、技術選定や設計判断における実践的な判断力の土台となっています。複数案件の同時並行稼働や、開発から本番運用・保守までを一人で完結させた経験も重ね、現在はAI基盤の技術戦略にも携わりながら個人での受託開発を継続しています。要件定義・設計・実装・本番リリース・運用保守までをワンストップで担うことができます。
strengths:
  - LLMに任せる領域と、人間の承認・監査・実行制御で守る領域を分けた設計
  - AIを自律的な実行主体にせず、AIの出力を人間とシステムが検証・承認した上で動かす
  - 要件整理から設計・実装・本番運用まで一人で完結
  - ハルシネーション排除・コスト最適化・本番稼働まで含めて設計する
  - LLMの出力ブレに依存しない決定論的なレイヤーを設計に組み込む
  - 動くプロトタイプを2〜3週間で提供し、実運用に耐える品質まで仕上げる
  - 納品して終わりではなく、操作研修や保守まで含めて伴走する
  - ホームページ制作からWebアプリ開発まで、Web受託開発を継続的に手がけてきた
works:
  - name: コーチング事業者向けAI業務自動化基盤
    summary: Discord Botによる日次振り返り収集、週次・月次レポートの自動生成、承認付きLINE配信、RAG検索を統合した管理ダッシュボードを構築。要件整理から本番運用まで単独で担当し、現在も継続稼働中。
    outcomes:
      - 週150分かかっていたレポート作成業務を実質ゼロに削減
      - 月次レポート1件あたりの送信処理が5分から30秒に短縮
      - 導入1ヶ月で生徒数が30名増加し、解約率が30%低下
    experienceNote: 50名の生徒を実質1人で支えるコーチングスクールでは、面談後のレポート作成から保護者への送信・確認まで週150分以上がルーティン業務に消え、支援の質を高める余裕も複数コーチ体制への移行もできない状態でした。課題の本質が「工数の多さ」ではなく「記録・整理・送信・参照が分散した運営構造そのもの」にあると整理し、日次振り返りを週次・月次レポートへ階層的に自動集約する実行基盤を設計・実装しました。約1.5ヶ月で本番移行を果たし、これまで機能しなかった複数コーチ体制を現実的に運用できる仕組みへと転換しています。
    stack:
      - Python
      - Discord.py
      - Next.js
      - TypeScript
      - React
      - Supabase (PostgreSQL)
      - LLM API (OpenAI/Anthropic)
      - LINE Messaging API
      - RAG
      - Docker
      - Render
    url: https://github.com/Ink6x/coaching-ai-workflow
  - name: エンタープライズ向けAI業務自動化基盤
    summary: Slackの自然言語指示で対外オペレーション業務を制御できる実行基盤を設計・開発。Policy Gateによる8項目の機械的検証と人間承認を必須とし、AIが直接外部に副作用を及ぼさない安全設計を実現しました。
    outcomes:
      - 担当者1人あたり月15〜20時間の工数を削減（チーム全体では月60時間規模のルーティンが対象）
      - コマンド更新にかかる時間を約1/4に圧縮
      - 作業状況の確認時間を10分から1分台に短縮
    experienceNote: 複数のプラットフォームをCLIで個別操作し、状況管理も複数ツールに分散していたため、チーム全体で月60時間規模の工数がルーティン作業に費やされていました。「AIを実行主体にしない」という設計判断のもと、AIが生成した実行計画を8項目のPolicy Gateで機械的に検証し、人間の承認を経て初めて処理が走る仕組みを構築しました。メンバー2名のマネジメントやクライアントとの週次定例・工数見積もりも担当し、開発全体を推進しました。結果として、分散していた操作・確認・管理の流れをSlack一本に集約し、担当者の日常業務負荷を大幅に軽減できました。
    stack:
      - Python
      - Slack API
      - Action DSL（自作）
      - Policy Gate
      - Command Registry
      - Playwright
      - Docker
      - AWS
      - PostgreSQL (State Store)
      - Notion API
      - Audit Logging
    url: https://github.com/Ink6x/ai-workflow-automation
  - name: 自動車販売・整備事業者向け社内DX
    summary: 顧客進捗・案件状況・台車運用を一元管理するWebアプリの設計・実装。紙書類のOCR取り込み、LLMによる書類フォーマット自動生成、スケジュールレコメンド機能を統合。
    outcomes:
      - 導入後、月あたり7件の受注増加を達成
      - 顧客対応のレスポンス時間短縮・案件管理ミスの削減を実現（事実確認済み、具体数値は非公開）
    experienceNote: 社員4名規模の自動車販売・整備事業者では、顧客ごとの進捗・整備スケジュール・台車の空き状況がすべて経営者の頭の中にしか存在せず、情報の属人化が業務の足かせになっていました。経営者へのヒアリングから要件定義を行い、管理画面・バックエンド・データモデリングまでをひとりで設計・実装し、操作研修と本番運用への移行まで完遂しました。導入後は案件の見落としや対応の遅れが減り、経営者が現場の状況をリアルタイムで把握できる体制が整いました。
    stack:
      - Python
      - TypeScript
      - Next.js
      - Tailwind CSS
      - FastAPI
      - PostgreSQL (Supabase)
      - Supabase Auth
      - Anthropic Claude API (Vision/書類生成)
      - Vercel
  - name: 求人スカウト業務自動化プラットフォーム
    summary: 複数求人媒体へのスカウト送信・応募者管理を自動化するWebアプリとクラウド基盤を構築。データモデル設計からAPI実装・管理画面・CI/CD整備まで一気通貫で担当しました。
    outcomes:
      - 新規3媒体の連携をデータモデル・API・管理画面まで一気通貫で追加実装
      - 稼働基盤をGCEからCloud Runへ移行し、インフラ構成をすべてTerraformでコード管理
      - 本番から独立したstaging環境をゼロ構築し、GitHub Actions + Artifact Registryによるデプロイを完全自動化
    experienceNote: 求人媒体ごとに仕様やデータ構造がまったく異なるため、媒体を増やすたびに人手作業と実装コストが積み上がる状況でした。既存の稼働基盤は本番と検証環境が分離されておらず、リリースのたびにリスクを抱えていたため、まず本番から完全独立したstaging環境をゼロから構築し、安全にリリースできるフローを整えました。その上で新規3媒体の連携をデータモデルからスカウト送信API・管理画面まで一貫して実装し、インフラをCloud Runへ移行・Terraform管理へ統一することで、今後の媒体追加コストを大きく下げる基盤を作りました。
    stack:
      - Python
      - Django
      - Django REST Framework
      - FastAPI（連携）
      - PostgreSQL (Cloud SQL)
      - Terraform
      - Cloud Run
      - GCP
      - Docker
      - GitHub Actions
      - Playwright（連携）
    url: https://ink6x.vercel.app/work/scout-automation-platform
  - name: 社内文書RAGパイプライン構築支援
    summary: エンタープライズ向け社内文書RAGシステムの開発支援。ドキュメント取り込み・チャンク化・埋め込み・ベクトル検索の一貫パイプライン構築、検索精度チューニング、LLMと古典MLの使い分け設計を担当。
    outcomes:
      - 社内文書RAGパイプラインをドキュメント取り込みからベクトル検索まで一貫して構築し、形式・所在がばらばらな文書群に対して統一的なAI検索基盤を整備しました
    experienceNote: 「社内に散在する文書をAIに答えさせたい」というエンタープライズ顧客の要望を受け、AI開発受託企業のプロジェクトに参画しました。文書の形式や保管場所がばらばらな状態から、OpenAI API・LangChain・LangGraphを用いてドキュメント取り込みから検索までのRAGパイプラインを一貫して構築しました。LLMに任せる領域と古典的機械学習で解く領域の切り分けについても技術選定の議論に加わり、精度チューニングを重ねて実用レベルの検索品質を実現しました。
    stack:
      - Python
      - LangChain
      - LangGraph
      - OpenAI SDK
      - RAG
      - Vector DB
      - PostgreSQL
  - name: マッチングサービス0→1立ち上げ(AI推論)
    summary: LLM embeddingベースの類似度マッチングロジックの設計・実装、プロフィール画像解析（Vision API）・自由記述テキスト解析、AI推論サービス（FastAPI）の設計実装およびバックエンドとの連携設計
    outcomes:
      - マッチングロジックの設計から推論API実装までを主担当として完遂し、クローズドβでの仮説検証サイクルを通じてサービスをリリースまで導いた
    experienceNote: 仕様がまだ固まっていない新規マッチングサービスの立ち上げ期に、4名チームの一員としてフルコミットで参画しました。サービスの核となるマッチングロジックをどう実現するか手探りの状況で、LLM embeddingを用いた類似度算出の設計から推論APIの実装までを主担当として担いました。クローズドβでユーザーの反応を見ながら仮説検証を繰り返す体制のなか、精度と開発スピードを両立しながらマッチングロジックを作り上げ、サービスのリリースまで完遂しました。
    stack:
      - Python
      - FastAPI
      - TypeScript
      - NestJS
      - Express
      - React
      - PostgreSQL
      - LLM API
      - Embedding
      - AWS
  - name: 顔写真で歴史人物を判定するWebアプリ
    summary: 顔写真を送るだけで200名の歴史人物データベースから「最も魂が近い1名」を判定し、理由・歴史エピソード・名言を生成するWebアプリ。顔特徴の構造化抽出・決定論的スコアリング・ナラティブ生成の3段パイプラインで構成。
    outcomes:
      - 200名・8カテゴリの歴史人物データベースから判定。架空人物の出力をスキーマ制約と決定論的スコアリングで構造的に排除
      - 顔特徴を8軸で構造化抽出し、判定根拠を明示した上でナラティブを生成する3段パイプラインを実装
      - サーバーに保存される画像0件。画像はメモリ上のみで処理し、プライバシーリスクをアーキテクチャレベルで排除
    experienceNote: 「LLMアプリで同じ人物ばかり出る」「存在しない架空人物が出る」「判定結果がブレる」という課題を構造から解消するために個人プロジェクトとして設計・開発しました。判定ロジックをLLMから切り離した純関数の重み付き距離計算で実装することで、同じ写真を入力すれば常に同じ人物が返る決定論的な仕組みを実現しています。画像はサーバーに一切保存せずメモリ上のみで処理し、プライバシーへの配慮も設計段階から組み込みました。SNSでシェアしやすい動的OGP生成にも対応し、体験の拡散まで一貫して作り込んでいます。
    stack:
      - Next.js
      - React 19
      - TypeScript
      - Claude API
      - Tool Use
      - Prompt Caching
      - Tailwind CSS
      - Zod
      - Upstash Redis
      - Vercel
    url: https://github.com/Ink6x/history-soul-matcher
