# onboard 固有の営業設定(手管理。knowledge-base には存在しない情報)
# profile.yaml は `npm run profile:sync` による自動生成物になったため、
# スコアリング用キーワード・営業条件・入札設定はこのファイルで編集すること。
# 同期時に knowledge-base 由来の内容と合成されて profile.yaml に出力される。

