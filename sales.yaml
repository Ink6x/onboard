conditions:
  minBudgetYen: 1000 # 検証中は小額案件も通す(本番は50000等に戻す)
  # 稼働可能枠の上限。提案文では一律にこれを提示せず、案件側の要望に合わせて柔軟に表現する
  # (生成プロンプト側の「稼働時間の提示ルール」参照)
  weeklyHours: 平日最大4日・土日も稼働可
  responseSla: ご連絡には24時間以内に返信します
  firstDraftDays: 着手から5営業日以内に初回成果物を共有します

# 自動送信時の希望金額・納期の決め方(SUBMIT_MODE=auto)
bidding:
  budgetRatio: 0.9 # 予算上限の90%を提示
  fallbackAmountYen: 5000 # 予算不明時の提示額
  deliveryDays: 30 # 提示する納期(日数)
  minAmountYen: 1000 # 希望金額の下限ガード(検証中は小額に。本番は30000等)
